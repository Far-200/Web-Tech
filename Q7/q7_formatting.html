<!doctype html>
<html>
  <head>
    <title>Question 7 - Text Formatting Tags</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4fff4;
        padding: 30px;
      }
      h1 {
        color: darkgreen;
        text-align: center;
      }
      .underline-css {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1>Text Formatting in HTML</h1>

    <p><b>a) Superscript:</b> X<sup>2</sup> + Y<sup>2</sup></p>

    <p><b>b) Subscript:</b> H<sub>2</sub>O</p>

    <p><b>c) Strike through:</b> <strike>Old Price Rs.500</strike></p>

    <p>
      <b>d) Super bold:</b> <b><strong>This text is extra bold</strong></b>
    </p>

    <p>
      <b>e) Underline (other than U tag):</b>
      <span class="underline-css">This text is underlined using CSS</span>
    </p>
  </body>
</html>
