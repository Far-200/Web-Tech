<!doctype html>
<html>
  <head>
    <title>Question 13 - Special Characters</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #fff8f0;
        padding: 30px;
      }
      h1 {
        text-align: center;
        color: brown;
      }
      table {
        width: 70%;
        margin: auto;
        border-collapse: collapse;
        background-color: white;
      }
      th,
      td {
        border: 1px solid black;
        padding: 12px;
        text-align: center;
      }
      th {
        background-color: #f5deb3;
      }
    </style>
  </head>
  <body>
    <h1>Print Other Characters</h1>

    <table>
      <tr>
        <th>SYMBOL</th>
        <th>DESCRIPTION</th>
      </tr>
      <tr>
        <td>&quot;</td>
        <td>Quotation Mark</td>
      </tr>
      <tr>
        <td>&amp;</td>
        <td>Ampersand Sign</td>
      </tr>
      <tr>
        <td>&lt;</td>
        <td>Less Than Sign</td>
      </tr>
      <tr>
        <td>&gt;</td>
        <td>Greater Than Sign</td>
      </tr>
      <tr>
        <td>&copy;</td>
        <td>Copyright Symbol</td>
      </tr>
      <tr>
        <td>&reg;</td>
        <td>Registered Symbol</td>
      </tr>
      <tr>
        <td>&nbsp;</td>
        <td>A blank space / Non-breaking one space</td>
      </tr>
    </table>
  </body>
</html>
