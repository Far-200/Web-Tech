<!doctype html>
<html>
  <head>
    <title>Question 4 - Countries List</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #eef7ff;
        padding: 40px;
      }
      .box {
        width: 350px;
        margin: auto;
        background-color: white;
        border: 2px solid #2c3e50;
        padding: 20px;
        border-radius: 10px;
      }
      label {
        font-size: 20px;
        font-weight: bold;
      }
      select {
        width: 180px;
        height: 220px;
        font-size: 16px;
        margin-left: 20px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <label>Select Countries :</label>
      <select multiple>
        <option>London</option>
        <option selected>India</option>
        <option>Japan</option>
        <option selected>German</option>
        <option>America</option>
        <option>Canada</option>
        <option>Australia</option>
        <option>Brazil</option>
        <option>China</option>
        <option selected>France</option>
      </select>
    </div>
  </body>
</html>
